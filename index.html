<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>309 Poker Club - 數據中心 v4.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', 'PingFang HK', 'Microsoft JhengHei', sans-serif; padding: 15px; background-color: var(--bg); color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .admin-toggle-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-admin { background: #edf2f7; color: #718096; padding: 10px 20px; font-size: 14px; border-radius: 8px; cursor: pointer; border: 1px solid #cbd5e0; font-weight: bold; }
        #topArea { display: none; margin-bottom: 30px; padding: 20px; background: #fff; border: 2px solid #edf2f7; border-radius: 12px; }
        .player-manager { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px; border-left: 5px solid var(--primary); padding-left: 12px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f1f4f8; color: #4a5568; padding: 12px 8px; font-size: 13px; text-align: center; }
        td { padding: 10px 5px; border-bottom: 1px solid #edf2f7; text-align: center; }
        .player-select { font-size: 18px !important; font-weight: bold; padding: 8px; border: 2px solid #cbd5e0; border-radius: 8px; width: 150px; background: white; }
        .buyin, .endChips { font-size: 18px !important; font-weight: bold; text-align: center; border: 2px solid #e2e8f0; border-radius: 8px; padding: 8px; width: 85px; }
        .profit, .final { font-size: 19px !important; font-weight: 800; font-family: 'Consolas', monospace; }
        .result-neg { color: #e53e3e !important; }
        .result-pos { color: #38a169 !important; }
        .mini-balance-bar { margin-top: 15px; padding: 15px; background: var(--dark); color: white; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .btn-confirm { background: var(--success); color: white; }
        .btn-add { background: #ebf8ff; color: var(--primary); border: 1px solid var(--primary); }
        .tag { background: #eee; padding: 4px 10px; border-radius: 15px; font-size: 12px; margin-right: 5px; display: inline-block; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 10vh auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-toggle-bar">
        <button id="adminModeBtn" class="btn-admin" onclick="toggleAdminMode()">⚙️ 管理員登入</button>
    </div>

    <div id="topArea">
        <div class="player-manager">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="newName" placeholder="新玩家名" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                <button class="btn btn-add" onclick="addPlayerToList()">＋ 錄入名單</button>
            </div>
            <div id="playerTags" style="margin-top:10px;"></div>
        </div>
        <div class="section-header"><h3>當晚結算</h3><input type="date" id="gameDate"></div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>玩家</th><th>單位</th><th>買入</th><th>結算</th><th>盈虧</th><th>最終</th><th></th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="mini-balance-bar">
            <div>差距: <span id="chipDiff" style="color:#63b3ed; font-weight:bold;">0</span></div>
            <button id="saveBtn" class="btn btn-confirm" onclick="confirmSave()">💾 儲存到雲端</button>
        </div>
        <div style="margin-top:15px; display:flex; justify-content:space-between;">
            <button class="btn btn-add" style="background:#2c3e50; color:white;" onclick="addRow()">+ 新增玩家</button>
            <button class="btn" onclick="resetCurrentTable()">🔄 重置表格</button>
        </div>
    </div>

    <div id="bottomArea">
        <div class="section-header"><h3>🏆 長期總結算 (雲端數據)</h3></div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>玩家</th><th>場次</th><th>累計盈虧</th><th>皇冠 👑</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
        <div style="margin-top:30px;"><canvas id="trendChart"></canvas></div>
    </div>
</div>

<div id="playerModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <h3 id="modalPlayerName"></h3>
        <div style="max-height: 400px; overflow-y: auto;"><table style="width: 100%;"><tbody id="modalTableBody"></tbody></table></div>
        <button class="btn" style="width:100%; margin-top:15px;" onclick="closeModal()">關閉</button>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzNuSQJ2ZmyTmnt-1G2bfYwtcVdXcD5iVvULkSYnsij3wJfs6UOQKCgWJvan6bqwByl/exec";
    const ADMIN_PW = "309309"; 
    let historyData = [];
    let trendChart = null;

    function getStoredPlayers() {
        return JSON.parse(localStorage.getItem('poker_players') || "[]");
    }

    // --- 核心修正：強制刷新邏輯 ---
    function updateAllDropdowns() {
        const selects = document.querySelectorAll('.player-select');
        const masterList = getStoredPlayers();
        
        // 紀錄目前每一行已經選了誰
        const selectedValues = Array.from(selects).map(s => s.value);

        selects.forEach((select, index) => {
            const currentSelected = select.value; // 這格目前選的人
            let html = `<option value="">-- 請選擇 --</option>`;
            
            masterList.forEach(name => {
                // 如果這個名字被別行選走了，就隱藏；但如果是自己這行選的，就保留
                const isSelectedByOthers = selectedValues.some((val, i) => val === name && i !== index);
                
                if (!isSelectedByOthers) {
                    html += `<option value="${name}" ${name === currentSelected ? 'selected' : ''}>${name}</option>`;
                }
            });
            select.innerHTML = html;
        });
    }

    function toggleAdminMode() {
        if (prompt("密碼：") === ADMIN_PW) {
            document.getElementById('topArea').style.display = 'block';
            document.getElementById('adminModeBtn').innerText = "🔒 管理模式中";
            updateAllDropdowns();
        } else { alert("密碼錯誤"); }
    }

    function addRow(prefill = null) {
        const row = document.getElementById('tableBody').insertRow();
        row.innerHTML = `<td><select class="player-select" onchange="updateAllDropdowns(); saveDraft();"></select></td>
            <td><input type="number" class="buyin" placeholder="0" oninput="calculate(this)"></td>
            <td class="chips" style="color:#718096; font-size:14px;">0</td>
            <td><input type="number" class="endChips" placeholder="0" oninput="calculate(this)"></td>
            <td class="profit">0</td><td class="final">0</td>
            <td><span style="cursor:pointer;color:#ccc;font-size:20px;" onclick="this.closest('tr').remove(); updateAllDropdowns(); auditChips(); saveDraft();">✕</span></td>`;
        
        if (prefill) {
            row.querySelector('.player-select').value = prefill.name;
            row.querySelector('.buyin').value = prefill.buyin;
            row.querySelector('.endChips').value = prefill.end;
        }
        
        updateAllDropdowns(); // 每加一行就刷新一次選單過濾
        return row;
    }

    function calculate(el) {
        const row = el.closest('tr');
        const b = parseFloat(row.querySelector('.buyin').value) || 0;
        const e = parseFloat(row.querySelector('.endChips').value) || 0;
        const bc = b * 2000;
        row.querySelector('.chips').innerText = bc;
        const p = (e - bc) / 2;
        const f = p - 100;
        
        const pCell = row.querySelector('.profit');
        pCell.innerText = p >= 0 ? p : `(${Math.abs(p)})`;
        pCell.className = "profit " + (p >= 0 ? "result-pos" : "result-neg");
        
        const fCell = row.querySelector('.final');
        fCell.innerText = f >= 0 ? f : `(${Math.abs(f)})`;
        fCell.className = "final " + (f >= 0 ? "result-pos" : "result-neg");
        
        auditChips(); saveDraft();
    }

    function auditChips() {
        let b = 0, e = 0;
        document.querySelectorAll('.chips').forEach(td => b += parseFloat(td.innerText) || 0);
        document.querySelectorAll('.endChips').forEach(i => e += parseFloat(i.value) || 0);
        const diff = e - b;
        const el = document.getElementById('chipDiff');
        el.innerText = diff;
        el.style.color = (diff === 0) ? "#63b3ed" : "#fc8181";
    }

    function addPlayerToList() {
        const name = document.getElementById('newName').value.trim();
        if (name) {
            let list = getStoredPlayers();
            if (!list.includes(name)) {
                list.push(name);
                localStorage.setItem('poker_players', JSON.stringify(list));
                renderPlayerTags(); 
                updateAllDropdowns(); // 錄入後立刻讓選單出現新名字
            }
        }
        document.getElementById('newName').value = '';
    }

    function renderPlayerTags() {
        document.getElementById('playerTags').innerHTML = getStoredPlayers().map(n => `<span class="tag">${n}</span>`).join('');
    }

    async function fetchFromCloud() {
        try {
            const r = await fetch(CLOUD_URL);
            historyData = await r.json();
            renderHistory();
        } catch(e) { console.error(e); }
    }

    function renderHistory() {
        const summary = {};
        const batches = {};
        historyData.forEach(item => {
            if (!summary[item.name]) summary[item.name] = { count: 0, total: 0 };
            summary[item.name].count++;
            summary[item.name].total += parseFloat(item.score);
            if (!batches[item.batchId]) batches[item.batchId] = [];
            batches[item.batchId].push(item);
        });
        const crowns = {};
        Object.values(batches).forEach(list => {
            let max = Math.max(...list.map(p => parseFloat(p.score)));
            if (max > 0) list.forEach(p => { if(parseFloat(p.score) === max) crowns[p.name] = (crowns[p.name] || 0) + 1; });
        });
        const sorted = Object.keys(summary).sort((a, b) => summary[b].total - summary[a].total);
        document.getElementById('historyBody').innerHTML = sorted.map(name => {
            const t = summary[name].total;
            return `<tr><td style="color:var(--primary); font-weight:bold; cursor:pointer;" onclick="showPlayerDetail('${name}')">${name}</td>
                <td>${summary[name].count}</td><td class="${t>=0?'result-pos':'result-neg'}">${t>=0?t.toFixed(0):'('+Math.abs(t).toFixed(0)+')'}</td>
                <td style="color:var(--warning);">${crowns[name] ? '👑 '+crowns[name] : '-'}</td></tr>`;
        }).join('');
        updateTrendChart();
    }

    function updateTrendChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        const dates = [...new Set(historyData.map(d => d.date.split('T')[0]))].sort();
        const counts = {}; historyData.forEach(d => counts[d.name] = (counts[d.name] || 0) + 1);
        const core = Object.keys(counts).filter(n => counts[n] >= 7);
        const datasets = core.map(name => {
            let cum = 0;
            const pts = dates.map(dt => {
                const rec = historyData.find(d => d.name === name && d.date.split('T')[0] === dt);
                if (rec) cum += parseFloat(rec.score);
                return cum;
            });
            return { label: name, data: pts, fill: false, tension: 0.1, borderColor: '#'+Math.floor(Math.random()*16777215).toString(16) };
        });
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, { type: 'line', data: { labels: dates, datasets: datasets }});
    }

    function showPlayerDetail(name) {
        document.getElementById('modalPlayerName').innerText = name;
        const filtered = historyData.filter(h => h.name === name).sort((a,b) => new Date(b.date) - new Date(a.date));
        document.getElementById('modalTableBody').innerHTML = filtered.map(r => {
            const s = parseFloat(r.score);
            return `<tr><td>${r.date.split('T')[0]}</td><td class="${s>=0?'result-pos':'result-neg'}">${s>=0?s:'('+Math.abs(s)+')'}</td></tr>`
        }).join('');
        document.getElementById('playerModal').style.display = "block";
    }

    function saveDraft() {
        const data = Array.from(document.querySelectorAll('#tableBody tr')).map(row => ({
            name: row.querySelector('.player-select').value,
            buyin: row.querySelector('.buyin').value,
            end: row.querySelector('.endChips').value
        }));
        localStorage.setItem('poker_draft_v4', JSON.stringify(data));
    }

    function closeModal() { document.getElementById('playerModal').style.display = "none"; }
    function resetCurrentTable() { if(confirm("確定重置表格？")) { localStorage.removeItem('poker_draft_v4'); location.reload(); } }

    async function confirmSave() {
        const payload = [];
        const date = document.getElementById('gameDate').value;
        const bid = 'B'+Date.now();
        document.querySelectorAll('#tableBody tr').forEach(r => {
            const n = r.querySelector('.player-select').value;
            const sText = r.querySelector('.final').innerText;
            const s = parseFloat(sText.replace('(','-').replace(')',''));
            if(n) payload.push({ date, name: n, score: s, batchId: bid });
        });
        if(!payload.length) return;
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "⏳ 同步中...";
        try {
            await fetch(CLOUD_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("✅ 同步成功！"); localStorage.removeItem('poker_draft_v4'); location.reload();
        } catch(e) { alert("❌ 儲存失敗"); btn.disabled = false; btn.innerText = "💾 儲存到雲端"; }
    }

    window.onload = () => {
        document.getElementById('gameDate').valueAsDate = new Date();
        renderPlayerTags(); fetchFromCloud();
        const draft = JSON.parse(localStorage.getItem('poker_draft_v4') || "[]");
        if (draft.length > 0) {
            draft.forEach(d => addRow(d));
            document.querySelectorAll('#tableBody tr').forEach(r => calculate(r.querySelector('.buyin')));
        } else {
            for(let i=0; i<6; i++) addRow();
        }
        updateAllDropdowns();
    };
</script>
</body>
</html>
