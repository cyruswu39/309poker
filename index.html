<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>309 Poker Club - 數據中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', 'PingFang HK', 'Microsoft JhengHei', sans-serif; padding: 20px; background-color: var(--bg); color: #333; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        #topArea { display: none; margin-bottom: 40px; padding-bottom: 40px; border-bottom: 2px dashed #edf2f7; }
        .admin-toggle-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .btn-admin { background: #edf2f7; color: #718096; padding: 8px 15px; font-size: 13px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }
        .btn-admin.active { background: #e53e3e; color: white; }
        .player-manager { background: #f8f9fa; padding: 18px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #edf2f7; }
        .tag { background: white; color: var(--dark); padding: 5px 12px; border-radius: 20px; border: 1px solid #cbd5e0; font-size: 13px; display: inline-flex; align-items: center; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 15px; border-left: 5px solid var(--primary); padding-left: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; border: 1px solid #edf2f7; border-radius: 10px; overflow: hidden; }
        th { background-color: #f1f4f8; color: #4a5568; padding: 12px; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; text-align: center; }
        .player-select { font-size: 18px !important; font-weight: 800; padding: 8px; border: 2px solid #cbd5e0; border-radius: 8px; width: 100%; }
        .buyin, .endChips { font-size: 18px !important; font-weight: bold; text-align: center; border: 2px solid #e2e8f0; border-radius: 8px; padding: 8px; width: 80px; }
        .profit, .final { font-size: 20px !important; font-weight: 800; font-family: 'Consolas', monospace; }
        .result-neg { color: #e53e3e !important; }
        .result-pos { color: #38a169 !important; }
        .mini-balance-bar { margin-top: 15px; padding: 15px; background: var(--dark); color: white; border-radius: 10px; display: flex; justify-content: flex-end; gap: 20px; align-items: center; }
        .btn { padding: 10px 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; font-size: 13px; }
        .btn-add { background: #ebf8ff; color: var(--primary); }
        .btn-confirm { background: var(--success); color: white; }
        .chart-container { margin-top: 30px; padding: 20px; background: #fff; border-radius: 16px; border: 1px solid #edf2f7; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 10vh auto; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }
        .hide-in-screenshot { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-toggle-bar hide-in-screenshot">
        <button id="adminModeBtn" class="btn-admin" onclick="toggleAdminMode()">⚙️ 管理員登入</button>
    </div>

    <div id="topArea">
        <div class="player-manager hide-in-screenshot">
            <h3 style="margin:0 0 10px 0; font-size:14px; color:#718096;">👤 名單管理</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="newName" placeholder="新玩家名稱" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                <button class="btn btn-add" onclick="addPlayerToList()">＋ 錄入</button>
            </div>
            <div id="playerTags" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:8px;"></div>
        </div>

        <div class="section-header">
            <h3>當晚遊戲結算表</h3>
            <input type="date" id="gameDate" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>玩家</th><th>買入單位</th><th>買入籌碼</th><th>結算籌碼</th><th>贏/輸</th><th>最終</th><th class="hide-in-screenshot"></th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="mini-balance-bar">
            <div>差距 <span id="chipDiff" style="font-weight:bold; color:#63b3ed;">0</span></div>
            <div id="balanceStatus">等待輸入</div>
            <button id="saveBtn" class="btn btn-confirm hide-in-screenshot" onclick="confirmSave()">💾 儲存到雲端</button>
        </div>
        
        <div style="margin-top:20px; display:flex; justify-content:space-between;" class="hide-in-screenshot">
            <button class="btn btn-add" style="background:var(--dark); color:white;" onclick="addRow()">+ 新增玩家一行</button>
            <button class="btn" onclick="resetCurrentTable()">🔄 重置</button>
        </div>
    </div>

    <div id="bottomArea">
        <div class="section-header"><h3>🏆 長期總結算 (雲端)</h3></div>
        <table id="historyTable">
            <thead><tr><th>玩家</th><th>場次</th><th>累計盈虧</th><th>皇冠</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
        <div class="chart-container"><canvas id="trendChart"></canvas></div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzNuSQJ2ZmyTmnt-1G2bfYwtcVdXcD5iVvULkSYnsij3wJfs6UOQKCgWJvan6bqwByl/exec";
    const ADMIN_PW = "309309"; 

    let isAdminMode = false;
    let historyData = [];

    // 核心邏輯：刷新所有下拉選單
    function updateAllDropdowns() {
        // 直接從 localStorage 獲取最新名單
        const list = JSON.parse(localStorage.getItem('poker_players')) || [];
        const selects = document.querySelectorAll('.player-select');
        
        // 紀錄目前每個選單已經選了誰
        const selectedValues = Array.from(selects).map(s => s.value);

        selects.forEach((select, index) => {
            const currentVal = selectedValues[index];
            let html = `<option value="">-- 請選擇 --</option>`;
            
            list.forEach(name => {
                // 如果這個名字被別人選了，就隱藏（除非是自己現在選的這個）
                const isTaken = selectedValues.some((v, i) => v === name && i !== index);
                if (!isTaken) {
                    html += `<option value="${name}" ${name === currentVal ? 'selected' : ''}>${name}</option>`;
                }
            });
            select.innerHTML = html;
        });
    }

    function toggleAdminMode() {
        const topArea = document.getElementById('topArea');
        const adminBtn = document.getElementById('adminModeBtn');
        if (!isAdminMode) {
            let input = prompt("請輸入管理員密碼：");
            if (input === ADMIN_PW) {
                isAdminMode = true;
                topArea.style.display = 'block';
                adminBtn.innerText = "🔒 退出管理模式";
                adminBtn.classList.add('active');
                // 登入後立即強行刷新一遍下拉選單
                updateAllDropdowns();
            } else if (input !== null) alert("密碼錯誤！");
        } else {
            isAdminMode = false;
            topArea.style.display = 'none';
            adminBtn.innerText = "⚙️ 管理員登入";
            adminBtn.classList.remove('active');
        }
    }

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td><select class="player-select" onchange="updateAllDropdowns(); saveDraft();"></select></td>
            <td><input type="number" class="buyin" placeholder="0" oninput="calculate(this)"></td>
            <td class="chips" style="color:#718096;">0</td>
            <td><input type="number" class="endChips" placeholder="0" oninput="calculate(this)"></td>
            <td class="profit">0</td>
            <td class="final">0</td>
            <td class="hide-in-screenshot"><span style="cursor:pointer;color:#ccc;" onclick="this.parentElement.parentElement.remove(); updateAllDropdowns(); auditChips();">✕</span></td>
        `;
        updateAllDropdowns();
        return row;
    }

    function addPlayerToList() {
        const name = document.getElementById('newName').value.trim();
        if (name) {
            let list = JSON.parse(localStorage.getItem('poker_players')) || [];
            if (!list.includes(name)) {
                list.push(name);
                localStorage.setItem('poker_players', JSON.stringify(list));
                renderPlayerTags();
                updateAllDropdowns();
            }
        }
        document.getElementById('newName').value = '';
    }

    function renderPlayerTags() {
        const list = JSON.parse(localStorage.getItem('poker_players')) || [];
        document.getElementById('playerTags').innerHTML = list.map(n => `<span class="tag">${n}</span>`).join('');
    }

    function calculate(el) {
        const row = el.closest('tr');
        const b = parseFloat(row.querySelector('.buyin').value) || 0;
        const e = parseFloat(row.querySelector('.endChips').value) || 0;
        const buyinChips = b * 2000;
        row.querySelector('.chips').innerText = buyinChips;
        const p = (e - buyinChips) / 2;
        const f = p - 100;
        
        row.querySelector('.profit').innerText = p >= 0 ? p : `(${Math.abs(p)})`;
        row.querySelector('.profit').className = "profit " + (p >= 0 ? "result-pos" : "result-neg");
        row.querySelector('.final').innerText = f >= 0 ? f : `(${Math.abs(f)})`;
        row.querySelector('.final').className = "final " + (f >= 0 ? "result-pos" : "result-neg");
        auditChips();
        saveDraft();
    }

    function auditChips() {
        let b = 0, e = 0;
        document.querySelectorAll('.chips').forEach(td => b += parseFloat(td.innerText) || 0);
        document.querySelectorAll('.endChips').forEach(i => e += parseFloat(i.value) || 0);
        const d = e - b;
        document.getElementById('chipDiff').innerText = d;
        document.getElementById('balanceStatus').innerText = (b > 0 && d === 0) ? "✅ 已平盤" : "等待輸入";
    }

    function saveDraft() {
        const data = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            data.push({
                name: row.querySelector('.player-select').value,
                buyin: row.querySelector('.buyin').value,
                end: row.querySelector('.endChips').value
            });
        });
        localStorage.setItem('poker_draft_v4', JSON.stringify(data));
    }

    async function fetchFromCloud() {
        try {
            const r = await fetch(CLOUD_URL);
            historyData = await r.json();
            renderHistory();
        } catch(e) {}
    }

    function renderHistory() {
        const sum = {};
        historyData.forEach(i => {
            if(!sum[i.name]) sum[i.name] = {c:0, t:0};
            sum[i.name].c++;
            sum[i.name].t += parseFloat(i.score);
        });
        const sorted = Object.keys(sum).sort((a,b) => sum[b].t - sum[a].t);
        document.getElementById('historyBody').innerHTML = sorted.map(n => `
            <tr><td>${n}</td><td>${sum[n].c}</td><td class="${sum[n].t>=0?'result-pos':'result-neg'}">${sum[n].t.toFixed(0)}</td><td>-</td></tr>
        `).join('');
    }

    function resetCurrentTable() {
        if(confirm("確定重置？")) { localStorage.removeItem('poker_draft_v4'); location.reload(); }
    }

    async function confirmSave() {
        const rows = document.querySelectorAll('#tableBody tr');
        const p = [];
        rows.forEach(r => {
            const n = r.querySelector('.player-select').value;
            const s = parseFloat(r.querySelector('.final').innerText.replace('(','-').replace(')',''));
            if(n) p.push({date: document.getElementById('gameDate').value, name: n, score: s, batchId: 'B'+Date.now()});
        });
        if(p.length === 0) return;
        document.getElementById('saveBtn').innerText = "儲存中...";
        await fetch(CLOUD_URL, {method:"POST", body:JSON.stringify(p)});
        alert("儲存成功");
        localStorage.removeItem('poker_draft_v4');
        location.reload();
    }

    window.onload = () => {
        document.getElementById('gameDate').valueAsDate = new Date();
        renderPlayerTags();
        fetchFromCloud();

        // 載入草稿或空行
        const draft = JSON.parse(localStorage.getItem('poker_draft_v4'));
        if (draft && draft.length > 0) {
            draft.forEach(d => {
                const row = addRow();
                row.querySelector('.player-select').value = d.name;
                row.querySelector('.buyin').value = d.buyin;
                row.querySelector('.endChips').value = d.end;
                calculate(row.querySelector('.buyin'));
            });
        } else {
            for(let i=0; i<6; i++) addRow();
        }
        // 確保名單被加載到所有選單中
        updateAllDropdowns();
    };
</script>

</body>
</html>
