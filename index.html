<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>309 Poker Club - 數據中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', 'PingFang HK', 'Microsoft JhengHei', sans-serif; padding: 15px; background-color: var(--bg); color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* 管理員登入列 */
        .admin-toggle-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-admin { background: #edf2f7; color: #718096; padding: 10px 20px; font-size: 14px; border-radius: 8px; cursor: pointer; border: 1px solid #cbd5e0; font-weight: bold; }
        .btn-admin.active { background: #e53e3e; color: white; border-color: #c53030; }

        /* 輸入區域 */
        #topArea { display: none; margin-bottom: 30px; padding: 20px; background: #fff; border: 2px solid #edf2f7; border-radius: 12px; }
        .player-manager { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px; border-left: 5px solid var(--primary); padding-left: 12px; }
        
        /* 表格優化 */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f1f4f8; color: #4a5568; padding: 12px 8px; font-size: 13px; text-align: center; }
        td { padding: 10px 5px; border-bottom: 1px solid #edf2f7; text-align: center; }
        
        .player-select { font-size: 18px !important; font-weight: bold; padding: 8px; border: 2px solid #cbd5e0; border-radius: 8px; width: 120px; }
        .buyin, .endChips { font-size: 18px !important; font-weight: bold; text-align: center; border: 2px solid #e2e8f0; border-radius: 8px; padding: 8px; width: 80px; }
        
        .profit, .final { font-size: 19px !important; font-weight: 800; font-family: 'Consolas', monospace; }
        .result-neg { color: #e53e3e !important; }
        .result-pos { color: #38a169 !important; }

        /* 底部欄 */
        .mini-balance-bar { margin-top: 15px; padding: 15px; background: var(--dark); color: white; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .btn-confirm { background: var(--success); color: white; }
        .btn-add { background: #ebf8ff; color: var(--primary); border: 1px solid var(--primary); }

        .tag { background: #eee; padding: 4px 10px; border-radius: 15px; font-size: 12px; margin-right: 5px; }
        .hide-in-screenshot { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-toggle-bar hide-in-screenshot">
        <button id="adminModeBtn" class="btn-admin" onclick="toggleAdminMode()">⚙️ 管理員登入 (錄入數據)</button>
    </div>

    <div id="topArea">
        <div class="player-manager">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="newName" placeholder="新增玩家名稱" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                <button class="btn btn-add" onclick="addPlayerToList()">＋ 錄入</button>
            </div>
            <div id="playerTags" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
        </div>

        <div class="section-header">
            <h3 style="margin:0;">當晚結算</h3>
            <input type="date" id="gameDate" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>玩家</th><th>單位</th><th>買入</th><th>結算</th><th>盈虧</th><th>最終</th><th></th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="mini-balance-bar">
            <div>差距: <span id="chipDiff" style="color:#63b3ed; font-weight:bold;">0</span></div>
            <button id="saveBtn" class="btn btn-confirm" onclick="confirmSave()">💾 儲存到雲端</button>
        </div>
        
        <div style="margin-top:15px; display:flex; justify-content:space-between;">
            <button class="btn btn-add" style="background:#2c3e50; color:white; border:none;" onclick="addRow()">+ 新增玩家</button>
            <button class="btn" style="background:#f1f4f8;" onclick="resetCurrentTable()">🔄 重置</button>
        </div>
    </div>

    <div id="bottomArea">
        <div class="section-header"><h3>🏆 長期總結算</h3></div>
        <div class="table-wrapper">
            <table id="historyTable">
                <thead><tr><th>玩家</th><th>場次</th><th>累計盈虧</th><th>皇冠</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
        <div style="margin-top:30px;"><canvas id="trendChart"></canvas></div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzNuSQJ2ZmyTmnt-1G2bfYwtcVdXcD5iVvULkSYnsij3wJfs6UOQKCgWJvan6bqwByl/exec";
    const ADMIN_PW = "309309"; 

    let isAdminMode = false;
    let historyData = [];

    // 關鍵修正：刷新所有下拉選單，強制從 localStorage 讀取
    function updateAllDropdowns() {
        const list = JSON.parse(localStorage.getItem('poker_players')) || [];
        const selects = document.querySelectorAll('.player-select');
        
        selects.forEach(select => {
            const currentVal = select.value;
            let html = `<option value="">-- 選擇 --</option>`;
            list.forEach(name => {
                html += `<option value="${name}" ${name === currentVal ? 'selected' : ''}>${name}</option>`;
            });
            select.innerHTML = html;
        });
    }

    function toggleAdminMode() {
        const input = prompt("請輸入管理員密碼：");
        if (input === ADMIN_PW) {
            isAdminMode = true;
            document.getElementById('topArea').style.display = 'block';
            document.getElementById('adminModeBtn').innerText = "🔒 退出管理模式";
            document.getElementById('adminModeBtn').classList.add('active');
            updateAllDropdowns(); // 顯示後立即填寫名單
        } else if (input !== null) {
            alert("密碼錯誤！");
        }
    }

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td><select class="player-select" onchange="updateAllDropdowns(); saveDraft();"></select></td>
            <td><input type="number" class="buyin" placeholder="0" oninput="calculate(this)"></td>
            <td class="chips">0</td>
            <td><input type="number" class="endChips" placeholder="0" oninput="calculate(this)"></td>
            <td class="profit">0</td>
            <td class="final">0</td>
            <td><span style="cursor:pointer;color:#ccc;" onclick="this.closest('tr').remove(); auditChips();">✕</span></td>
        `;
        updateAllDropdowns();
        return row;
    }

    function addPlayerToList() {
        const name = document.getElementById('newName').value.trim();
        if (name) {
            let list = JSON.parse(localStorage.getItem('poker_players')) || [];
            if (!list.includes(name)) {
                list.push(name);
                localStorage.setItem('poker_players', JSON.stringify(list));
                renderPlayerTags();
                updateAllDropdowns();
            }
        }
        document.getElementById('newName').value = '';
    }

    function renderPlayerTags() {
        const list = JSON.parse(localStorage.getItem('poker_players')) || [];
        document.getElementById('playerTags').innerHTML = list.map(n => `<span class="tag">${n}</span>`).join('');
    }

    function calculate(el) {
        const row = el.closest('tr');
        const b = parseFloat(row.querySelector('.buyin').value) || 0;
        const e = parseFloat(row.querySelector('.endChips').value) || 0;
        const bc = b * 2000;
        row.querySelector('.chips').innerText = bc;
        const p = (e - bc) / 2;
        const f = p - 100;
        
        row.querySelector('.profit').innerText = p >= 0 ? p : `(${Math.abs(p)})`;
        row.querySelector('.profit').className = "profit " + (p >= 0 ? "result-pos" : "result-neg");
        row.querySelector('.final').innerText = f >= 0 ? f : `(${Math.abs(f)})`;
        row.querySelector('.final').className = "final " + (f >= 0 ? "result-pos" : "result-neg");
        auditChips();
        saveDraft();
    }

    function auditChips() {
        let b = 0, e = 0;
        document.querySelectorAll('.chips').forEach(td => b += parseFloat(td.innerText) || 0);
        document.querySelectorAll('.endChips').forEach(i => e += parseFloat(i.value) || 0);
        document.getElementById('chipDiff').innerText = (e - b);
    }

    function saveDraft() {
        const data = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            data.push({
                name: row.querySelector('.player-select').value,
                buyin: row.querySelector('.buyin').value,
                end: row.querySelector('.endChips').value
            });
        });
        localStorage.setItem('poker_draft_v4', JSON.stringify(data));
    }

    async function fetchFromCloud() {
        try {
            const r = await fetch(CLOUD_URL);
            historyData = await r.json();
            renderHistory();
        } catch(e) {}
    }

    function renderHistory() {
        const sum = {};
        historyData.forEach(i => {
            if(!sum[i.name]) sum[i.name] = {c:0, t:0};
            sum[i.name].c++; sum[i.name].t += parseFloat(i.score);
        });
        const sorted = Object.keys(sum).sort((a,b) => sum[b].t - sum[a].t);
        document.getElementById('historyBody').innerHTML = sorted.map(n => `
            <tr><td>${n}</td><td>${sum[n].c}</td><td class="${sum[n].t>=0?'result-pos':'result-neg'}">${sum[n].t.toFixed(0)}</td><td>-</td></tr>
        `).join('');
    }

    function resetCurrentTable() {
        if(confirm("確定重置？")) { localStorage.removeItem('poker_draft_v4'); location.reload(); }
    }

    async function confirmSave() {
        const rows = document.querySelectorAll('#tableBody tr');
        const p = [];
        rows.forEach(r => {
            const n = r.querySelector('.player-select').value;
            const s = parseFloat(r.querySelector('.final').innerText.replace('(','-').replace(')',''));
            if(n) p.push({date: document.getElementById('gameDate').value, name: n, score: s, batchId: 'B'+Date.now()});
        });
        if(p.length === 0) return;
        document.getElementById('saveBtn').innerText = "儲存中...";
        await fetch(CLOUD_URL, {method:"POST", body:JSON.stringify(p)});
        alert("儲存成功");
        localStorage.removeItem('poker_draft_v4');
        location.reload();
    }

    window.onload = () => {
        document.getElementById('gameDate').valueAsDate = new Date();
        renderPlayerTags();
        fetchFromCloud();

        // 預先生成 8 行，確保選單元素存在
        const draft = JSON.parse(localStorage.getItem('poker_draft_v4')) || [];
        for(let i=0; i<Math.max(8, draft.length); i++) {
            const row = addRow();
            if(draft[i]) {
                row.querySelector('.player-select').value = draft[i].name;
                row.querySelector('.buyin').value = draft[i].buyin;
                row.querySelector('.endChips').value = draft[i].end;
                calculate(row.querySelector('.buyin'));
            }
        }
        updateAllDropdowns();
    };
</script>
</body>
</html>
